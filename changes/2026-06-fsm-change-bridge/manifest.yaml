# FSM Change Bridge — paired correlation fields on change_task and wm_order.
#
# Implements the schema half of ADR-0006 (cross-table bridge pattern). The
# bridge LOGIC ships separately as the scoped Fluent app x_jw_fsmchgbr; this
# update set ships the two reference fields the bridge reads/writes. Per
# ADR-0006 "global first", this PR merges and the update set imports BEFORE
# the scoped app deploys — otherwise the app's queries no-op against fields
# that don't exist yet.
#
# Generate the update set XML (run from the servicenow-coder repo root):
#   node scripts/build-update-set.js ../servicenow-coder-global/changes/2026-06-fsm-change-bridge/

name: FSM Change Bridge — correlation fields
description: |
    Adds paired reference fields linking change_task and wm_order for the FSM
    Work Order <-> Change Task bridge. change_task.u_linked_work_order points at
    the mirrored work order; wm_order.u_linked_change_task points back at the
    change task. Both nullable. Pairs with the scoped app x_jw_fsmchgbr.

application: global
target_release: 2026-Q2

intent: |
    Give each side of the FSM/ITSM change bridge a direct, queryable reference
    to its counterpart so either form can dereference the linked record in one
    read (no join, no related-list scan). The scoped app x_jw_fsmchgbr's
    FsmChangeBridge Script Include reads and writes these fields; the idempotent
    read-before-write loop guard (ADR-0006) compares the destination's current
    value against the intended value before writing, so these fields are also
    the substrate the loop-containment logic operates on.

artifacts:
    - type: dictionary_entry
      table: change_task
      element: u_linked_work_order
      column_label: Linked Work Order
      internal_type: reference
      reference: wm_order
      mandatory: false
      read_only: false
      active: true
      description: |
          Reference to the FSM work order mirrored from this change task by the
          x_jw_fsmchgbr bridge. Empty for change tasks that have no field-work
          counterpart. Set by FsmChangeBridge, not by hand.

    - type: dictionary_entry
      table: wm_order
      element: u_linked_change_task
      column_label: Linked Change Task
      internal_type: reference
      reference: change_task
      mandatory: false
      read_only: false
      active: true
      description: |
          Reference to the change task mirrored from this work order by the
          x_jw_fsmchgbr bridge. Empty for work orders with no change counterpart
          (e.g. purely reactive WOs). Set by FsmChangeBridge, not by hand.

estimated_impact:
    tables_modified:
        - change_task
        - wm_order
    bulk_data_changes: false
    rollback_complexity: low
    notes: |
        - Both fields are nullable references with no default — no data backfill.
        - No business rule or workflow ships in this update set; these are inert
          columns until the x_jw_fsmchgbr scoped app reads/writes them.
        - wm_order is the FSM Work Order table (extends sm_order). change_task is
          OOTB ITIL. Both are global scope, so the fields cannot ship via the
          scoped-app pipeline — hence this update-set-as-artifact (ADR-0001).
        - Rollback: null both fields everywhere, then drop. No record state is
          corrupted by removal since neither field has a default or a dependent
          business rule in this set.
        - Deploy order matters (ADR-0006): import + commit this set FIRST, then
          re-export instance-config/, then deploy x_jw_fsmchgbr.
