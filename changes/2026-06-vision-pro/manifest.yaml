# Catalog item clone — iPad pro -> Apple Vision Pro
#
# Source item on dev392282: sc_cat_item c3b9cbf29716cd1021983d1e6253afad
# Mirrors iPad pro's catalog/category/flow/access config; re-spec'd to real
# Apple Vision Pro values. Variables: Band size (S/M/L) + Storage (256/512/1TB).
#
# Generate:
#   node scripts/build-update-set.js \
#     /c/servicenow-coder-global/changes/2026-06-vision-pro/
#
# Preview against live instance:
#   python scripts/python/preview-update-set.py \
#     /c/servicenow-coder-global/changes/2026-06-vision-pro/built/update-set.xml

name: Catalog — Apple Vision Pro (clone of iPad pro)
description: |
    Adds a new "Apple Vision Pro" catalog item to the Service Catalog under the
    same Hardware category as iPad pro, with Band size + Storage variables.
    Modeled on the existing iPad pro item (sys_id
    c3b9cbf29716cd1021983d1e6253afad).

application: global
target_release: 2026-Q2

intent: |
    Extend the hardware catalog with Apple's spatial-computing headset. Net-new
    sc_cat_item — no field additions to OOTB tables, no overrides of existing
    data. Cloned from iPad pro so it inherits the same Service Catalog, Hardware
    category, restricted/snc_internal access, and OOTB fulfillment flow (so
    submitted requests generate approvals rather than stalling).

artifacts:
    - type: catalog_item
      name: Apple Vision Pro
      short_description: Request for Apple Vision Pro
      description: |
          <p><span style="font-size: 10pt;">Apple Vision Pro is a revolutionary spatial computer that blends digital content with your physical space, letting you navigate with your eyes, hands, and voice.</span></p>
          <p><span style="font-size: 10pt;"><strong>Key features:</strong></span></p>
          <ul style="list-style-position: inside;">
          <li style="font-size: 10pt;"><span style="font-size: 10pt;">Display: dual micro-OLED, 23 million pixels</span></li>
          <li style="font-size: 10pt;"><span style="font-size: 10pt;">Chips: Apple M2 + R1</span></li>
          <li style="font-size: 10pt;"><span style="font-size: 10pt;">Operating system: visionOS</span></li>
          <li style="font-size: 10pt;"><span style="font-size: 10pt;">Audio: Spatial Audio with dynamic head tracking</span></li>
          <li style="font-size: 10pt;"><span style="font-size: 10pt;">Cameras: stereoscopic 3D capture for spatial photos and videos</span></li>
          </ul>
      # Base price = 256GB tier. 512GB / 1TB add via storage choice 'misc' uplift.
      price: 3499
      cost: 0
      active: true
      availability: on_desktop
      access_type: restricted
      roles: snc_internal
      # Service Catalog (sc_catalogs) — matches iPad pro parent catalog
      catalogs: e0d08b13c3330100c8b837659bba8fb4
      # Hardware category — matches iPad pro primary category
      category: d258b953c611227a0146101fb1be7c31
      # OOTB "Service Catalog item request" flow — matches iPad pro; required so
      # submitted requests generate approvals (CLAUDE.md fulfillment-flow rule)
      flow_designer_flow: 30f3d26187e92300e0ef0cf888cb0b91
      # 2 days, encoded as epoch-offset datetime (ServiceNow Duration convention)
      delivery_time: "1970-01-03 00:00:00"
      fulfillment_automation_level: semi_automated
      variables:
          - name: band_size
            question_text: Choose the band size
            type: 3
            order: 10
            mandatory: true
            default_value: medium
            choices:
                - value: small
                  text: Small
                  order: 100
                - value: medium
                  text: Medium
                  order: 200
                - value: large
                  text: Large
                  order: 300

          - name: storage
            question_text: Choose the storage
            type: 3
            order: 20
            mandatory: true
            default_value: "256"
            do_not_select_first: true
            choices:
                - value: "256"
                  text: 256 GB
                  order: 100
                  misc: 0
                - value: "512"
                  text: 512 GB
                  order: 200
                  misc: 200
                - value: "1024"
                  text: 1 TB
                  order: 300
                  misc: 400

estimated_impact:
    tables_modified:
        - sc_cat_item
        - item_option_new
        - question_choice
    bulk_data_changes: false
    rollback_complexity: low
    notes: |
        - Net-new sc_cat_item record — no risk to existing iPad pro or any
          other catalog item.
        - 2 variables + 6 question_choice records all anchored to the new item
          by deterministic sys_id; no orphan risk on re-import.
        - Storage price uplift via question_choice.misc: 256GB +$0, 512GB +$200,
          1TB +$400 (base price 3499). Band size has no price implication.
        - Picture/icon are NOT cloned (binary attachment refs, out of scope for
          the manifest builder); the item ships without a thumbnail.
        - Rollback: deactivate the sc_cat_item (active=false); deterministic
          sys_ids stay stable for a future re-activation. Hard delete via UI if
          a true rollback is needed.
